name: Update IPC Data

on:
  schedule:
    # Run daily at 14:00 UTC (11:00 ART) — INDEC publishes in the morning
    - cron: '0 14 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ETL
        run: npm run update-data

      - name: Check for changes
        id: diff
        run: |
          git diff --name-only
          if git diff --quiet public/data/ipc-argentina.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes in IPC data"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "IPC data updated!"
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/ipc-argentina.json
          git commit -m "chore: update IPC data ($(date +%Y-%m-%d))"
          git push
